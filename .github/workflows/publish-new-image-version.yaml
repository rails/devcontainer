name: Build and Publish Images
"on":
  push:
    tags:
      - ruby-*.*.*
jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: echo "matrix=$(cat .github/ruby-versions.json | jq -c '.')" >> $GITHUB_OUTPUT

  build:
    name: Build Images
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        RUBY_VERSION: ${{ fromJSON(needs.setup.outputs.matrix) }}
        TARGET:
          - RUNNER: ubuntu-24.04
            BUILD_PLATFORM: linux/amd64
            PLATFORM_SUFFIX: amd64
          - RUNNER: ubuntu-24.04-arm
            BUILD_PLATFORM: linux/arm64
            PLATFORM_SUFFIX: arm64
    runs-on: ${{ matrix.TARGET.RUNNER }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Build and Publish Image
        uses: ./.github/actions/build-and-publish-image
        with:
          ruby_version: ${{ matrix.RUBY_VERSION }}
          build_platform: ${{ matrix.TARGET.BUILD_PLATFORM }}
          platform_suffix: ${{ matrix.TARGET.PLATFORM_SUFFIX }}
          image_tag: ${{ github.ref_name }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          repository_owner: ${{ github.repository_owner }}

  publish-manifests:
    name: Publish Multi-Arch Manifests
    needs: [setup, build]
    strategy:
      fail-fast: false
      matrix:
        RUBY_VERSION: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Publish Multi-Arch Manifest
        uses: ./.github/actions/build-and-publish-image
        with:
          publish_manifest: "true"
          ruby_version: ${{ matrix.RUBY_VERSION }}
          image_tag: ${{ github.ref_name }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          repository_owner: ${{ github.repository_owner }}
